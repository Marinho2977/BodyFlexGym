<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Bodyflex Gym</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        :root {
            --bg:       #0f0f0f;
            --surface:  #1a1a1a;
            --card:     #222222;
            --border:   #2e2e2e;
            --accent:   #FF6B00;
            --green:    #22c55e;
            --red:      #ef4444;
            --text:     #f5f5f5;
            --muted:    #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Three.js canvas */
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Fondo decorativo naranja */
        body::before {
            content: '';
            position: fixed;
            top: -200px; left: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,107,0,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .wrapper {
            width: 100%;
            max-width: 420px;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        /* Logo */
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -1px;
            text-align: center;
            margin-bottom: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .logo span { color: var(--accent); }

        .tagline {
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 36px;
        }

        /* Card */
        .card {
            background: rgba(34,34,34,0.85);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            animation: fadeInUp 0.5s ease both;
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }
        .card:hover {
            box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,107,0,0.1);
            transform: translateY(-2px);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        /* Flash messages */
        .flash {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .flash-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
        .flash-error   { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }

        /* Form */
        .field { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        /* Input wrapper for eye icon */
        .input-wrap { position: relative; }

        input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .input-wrap input { padding-right: 44px; }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255,107,0,0.2);
        }
        input::placeholder { color: var(--muted); }

        /* Eye button */
        .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--muted);
            padding: 4px;
            display: flex;
            align-items: center;
            transition: color 0.2s ease;
        }
        .eye-btn:hover { color: var(--accent); }
        .eye-btn svg { width: 18px; height: 18px; }

        /* Ripple button */
        .btn-submit {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 13px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity .2s, transform .1s, box-shadow .2s;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }
        .btn-submit:hover { opacity: .9; box-shadow: 0 4px 20px rgba(255,107,0,0.35); }
        .btn-submit:active { transform: scale(.99); }

        /* Ripple effect */
        .btn-submit .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: scale(0);
            animation: ripple-anim 0.6s linear;
            pointer-events: none;
        }
        @keyframes ripple-anim {
            to { transform: scale(4); opacity: 0; }
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--muted);
        }
        .footer-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
        .footer-link a:hover { text-decoration: underline; }

        /* Custom cursor dot */
        .cursor-dot {
            position: fixed; pointer-events: none; z-index: 9999;
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent); opacity: 0.7;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease, opacity 0.2s;
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="cursor-dot" id="cursorDot"></div>

<div class="wrapper">
    <div class="logo" style="justify-content:center; margin-bottom: 5px;">
        BODYFLEX<span>GYM</span>
    </div>
    <p class="tagline">Sistema de gestión de membresías</p>

    <div class="card">
        <div class="card-title">Iniciar Sesión</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for category, message in messages %}
                <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}{% endif %}
        {% endwith %}

        <form action="/iniciar" method="POST">
            <div class="field">
                <label>Correo electrónico</label>
                <input type="email" name="identificador" placeholder="tu@correo.com" required autofocus>
            </div>
            <div class="field">
                <label>Contraseña</label>
                <div class="input-wrap">
                    <input type="password" name="password" id="passLogin" placeholder="••••••••" required>
                    <button type="button" class="eye-btn" onclick="toggleEye('passLogin', this)" aria-label="Mostrar/ocultar contraseña">
                        <svg id="eyeLogin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-submit" onclick="addRipple(event, this)">Ingresar</button>
        </form>

        <p class="footer-link" style="margin-bottom: 10px;">
            <a href="/recuperar_contra">¿Olvidaste tu contraseña?</a>
        </p>
        <p class="footer-link">
            ¿No tienes cuenta? <a href="/registro">Regístrate aquí</a>
        </p>
    </div>
</div>

<!-- Three.js CDN -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
// ── Three.js background sphere ──
const canvas = document.getElementById('bg-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const geo = new THREE.IcosahedronGeometry(2.2, 2);
const mat = new THREE.MeshBasicMaterial({ color: 0xFF6B00, wireframe: true, opacity: 0.18, transparent: true });
const sphere = new THREE.Mesh(geo, mat);
scene.add(sphere);

const geo2 = new THREE.IcosahedronGeometry(1.2, 1);
const mat2 = new THREE.MeshBasicMaterial({ color: 0xFF8C40, wireframe: true, opacity: 0.08, transparent: true });
const sphere2 = new THREE.Mesh(geo2, mat2);
sphere2.position.set(2.5, -1, -2);
scene.add(sphere2);

function animate() {
    requestAnimationFrame(animate);
    sphere.rotation.y += 0.003;
    sphere.rotation.x += 0.001;
    sphere2.rotation.y -= 0.005;
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Eye toggle ──
const SVG_EYE = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width:18px;height:18px"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>`;
const SVG_EYE_OFF = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width:18px;height:18px"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" /></svg>`;

function toggleEye(inputId, btn) {
    const input = document.getElementById(inputId);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.innerHTML = isHidden ? SVG_EYE_OFF : SVG_EYE;
}

// ── Ripple effect ──
function addRipple(e, btn) {
    const rect = btn.getBoundingClientRect();
    const d = Math.max(rect.width, rect.height);
    const span = document.createElement('span');
    span.className = 'ripple';
    span.style.cssText = `width:${d}px;height:${d}px;left:${e.clientX-rect.left-d/2}px;top:${e.clientY-rect.top-d/2}px`;
    btn.appendChild(span);
    setTimeout(() => span.remove(), 700);
}

// ── Custom cursor dot ──
const dot = document.getElementById('cursorDot');
document.addEventListener('mousemove', e => {
    dot.style.left = e.clientX + 'px';
    dot.style.top  = e.clientY + 'px';
});
</script>

</body>
</html>
