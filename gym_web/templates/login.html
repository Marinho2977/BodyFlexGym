<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Bodyflex Gym</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0f0f0f;
            --surface:  #1a1a1a;
            --card:     #222222;
            --border:   #2e2e2e;
            --accent:   #FF6B00;
            --green:    #22c55e;
            --red:      #ef4444;
            --text:     #f5f5f5;
            --muted:    #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Fondo decorativo naranja */
        body::before {
            content: '';
            position: fixed;
            top: -200px; left: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,107,0,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .wrapper {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        /* Logo */
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -1px;
            text-align: center;
            margin-bottom: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .logo span { color: var(--accent); }

        .tagline {
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 36px;
        }

        /* Card */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
        }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        /* Flash messages */
        .flash {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .flash-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
        .flash-error   { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }

        /* Form */
        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255,107,0,0.2);
        }

        input::placeholder { color: var(--muted); }

        .btn-submit {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 13px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity .2s, transform .1s;
            letter-spacing: 0.3px;
        }

        .btn-submit:hover { opacity: .9; }
        .btn-submit:active { transform: scale(.99); }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--muted);
        }

        .footer-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="logo" style="justify-content:center; margin-bottom: 5px;">
        BODYFLEX<span>GYM</span>
    </div>
    <p class="tagline">Sistema de gestión de membresías</p>

    <div class="card">
        <div class="card-title">Iniciar Sesión</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for category, message in messages %}
                <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}{% endif %}
        {% endwith %}

        <form action="/iniciar" method="POST">
            <div class="field">
                <label>Correo electrónico</label>
                <input type="email" name="identificador" placeholder="tu@correo.com" required autofocus>
            </div>
            <div class="field">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Ingresar</button>
        </form>

        <p class="footer-link">
            ¿No tienes cuenta? <a href="/registro">Regístrate aquí</a>
        </p>
    </div>
</div>

</body>
</html>
